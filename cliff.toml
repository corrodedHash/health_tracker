# git-cliff configuration — https://git-cliff.org/docs/configuration
# Generate the latest release's notes:  git cliff --latest
# Regenerate the whole changelog:        git cliff

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.\n
"""
# The `<!-- N -->` prefixes only exist to order the groups; striptags removes them.
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}\
        - {{ commit.message | split(pat="\n") | first | upper_first }}
    {% endfor %}\
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
# Drop anything that isn't a conventional commit (merge commits, WIP, etc.).
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^Merge", skip = true },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^ci", skip = true },
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactor" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^chore", group = "<!-- 6 -->Miscellaneous" },
]
protect_breaking_commits = false
filter_commits = false
# Only tags shaped like v1.2.3 count as releases.
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"